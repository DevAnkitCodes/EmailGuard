<!DOCTYPE html>
<html>
<head>
    <style>
        body { width: 300px; padding: 15px; background: #020617; color: white; font-family: sans-serif; }
        .header { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .btn { 
            background: #2563eb; color: white; border: none; padding: 10px; 
            width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold;
        }
        .btn:hover { background: #1d4ed8; }
        #status { font-size: 11px; color: #94a3b8; margin-top: 10px; text-align: center; }
        .logo { font-size: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <span class="logo">🛡️</span>
        <b style="color: #3b82f6;">CyberGuard AI</b>
    </div>
    <button id="scan-btn" class="btn">Analyze Recent Emails</button>
    <div id="status">Ready to scan</div>
</body>
<script src="popup.js"></script>
</html>
