<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CyberGuard AI | Security Hub</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="logo">CYBER<span>GUARD</span></div>
        <button id="refresh-btn" class="btn-primary">REFRESH INBOX SCAN</button>
    </nav>

    <div class="container">
        <div id="deep-dive-card" class="card highlight-card" style="display:none;">
            <div class="card-header">
                <h3>Detailed AI Investigation</h3>
                <button onclick="this.parentElement.parentElement.style.display='none'">Close</button>
            </div>
            <div class="dive-content">
                <h2 id="dive-subject">--</h2>
                <div class="dive-grid">
                    <div class="dive-score-circle">
                        <span id="dive-score">0%</span>
                        <p id="dive-verdict">SECURE</p>
                    </div>
                    <div class="dive-text">
                        <p><strong>AI Explanation:</strong></p>
                        <p id="dive-explanation">Analyzing content...</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="metrics-grid">
            <div class="card">
                <h3>Global Risk Level</h3>
                <div class="chart-wrapper">
                    <canvas id="riskMeter"></canvas>
                    <div id="risk-text">0%</div>
                </div>
            </div>
            <div class="card">
                <h3>Inbox Health</h3>
                <div class="chart-wrapper">
                    <canvas id="compChart"></canvas>
                </div>
            </div>
        </div>

        <div class="card">
            <h3>Threat Analysis Log</h3>
            <div id="email-list" class="list-wrapper"></div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/charts.js') }}"></script>
</body>
</html>
