<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberGuard | AI Dashboard</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="logo">CyberGuard <span class="ai-tag">AI</span></div>
        <div class="nav-actions">
            <button id="refresh-btn" class="btn-primary">Refresh Analysis</button>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="metrics-grid">
            <div class="card chart-card">
                <h3>Global Risk Level</h3>
                <div class="chart-container">
                    <canvas id="riskMeter"></canvas>
                </div>
                <div id="risk-label" class="risk-value">--</div>
            </div>

            <div class="card chart-card">
                <h3>Inbox Composition</h3>
                <div class="chart-container">
                    <canvas id="compositionChart"></canvas>
                </div>
            </div>
        </div>

        <div class="card list-card">
            <h3>Threat Analysis Log</h3>
            <div id="email-list" class="email-items">
                <p class="loading-text">Click Refresh to start scanning...</p>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/charts.js') }}"></script>
</body>
</html>
