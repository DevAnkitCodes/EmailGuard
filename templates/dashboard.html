<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmailGuard AI | Security Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="top-nav">
        <div class="logo">
            <span class="shield-icon">🛡️</span> CyberGuard <span class="ai-pill">AI</span>
        </div>
        <div class="nav-controls">
            <button id="refresh-btn" class="btn-primary">Refresh Analysis</button>
            <a href="/logout" class="btn-logout">Logout</a>
        </div>
    </nav>

    <main class="dashboard-content">
        <div class="grid-layout">
            <div class="glass-card chart-card">
                <div class="card-header">
                    <h3>Overall Threat Risk</h3>
                </div>
                <div class="canvas-wrapper">
                    <canvas id="riskMeter"></canvas>
                    <div id="risk-display" class="risk-center-text">--</div>
                </div>
            </div>

            <div class="glass-card chart-card">
                <div class="card-header">
                    <h3>Inbox Composition</h3>
                </div>
                <div class="canvas-wrapper">
                    <canvas id="compositionChart"></canvas>
                </div>
            </div>
        </div>

        <div class="glass-card list-section">
            <div class="card-header list-header">
                <h3>Threat Analysis Log</h3>
                <span id="scan-count" class="scan-badge">0 Scanned</span>
            </div>
            <div id="email-list" class="email-container">
                <p class="placeholder-text">Click "Refresh Analysis" to begin AI scan...</p>
            </div>
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/charts.js') }}"></script>
</body>
</html>
